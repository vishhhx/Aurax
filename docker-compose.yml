services:
  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aurax

  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aurax
      POSTGRES_PASSWORD: auraxpassword
      POSTGRES_DB: aurax
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-data:
  mongo-data:
  postgres-data:
